name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: preview-deploy-${{ github.head_ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Generate preview metadata
        id: meta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          WORKER_NAME="ria-preview-pr-${PR_NUMBER}"
          PREVIEW_DOMAIN="pr-${PR_NUMBER}.re-in-act.org"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"
          echo "preview_domain=${PREVIEW_DOMAIN}" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://${PREVIEW_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview (Workers)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ steps.meta.outputs.worker_name }}

      - name: Bind custom domain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ steps.meta.outputs.worker_name }}
          PREVIEW_DOMAIN: ${{ steps.meta.outputs.preview_domain }}
        run: |
          # Check if custom domain already exists for this worker
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r ".result[] | select(.hostname == \"${PREVIEW_DOMAIN}\") | .id // empty")

          if [ -n "$EXISTING" ]; then
            echo "Domain ${PREVIEW_DOMAIN} already bound, skipping."
          else
            # Get zone ID for re-in-act.org
            ZONE_ID=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones?name=re-in-act.org" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | jq -r '.result[0].id')

            if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
              echo "::warning::Could not find zone for re-in-act.org. Preview available at workers.dev URL only."
              exit 0
            fi

            # Attach custom domain to worker
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"hostname\": \"${PREVIEW_DOMAIN}\", \"zone_id\": \"${ZONE_ID}\", \"service\": \"${WORKER_NAME}\", \"environment\": \"production\"}" \
              | jq .

            echo "Bound ${PREVIEW_DOMAIN} to ${WORKER_NAME}"
          fi

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            ### Preview Deployment

            | Status | URL |
            |--------|-----|
            | Deployed | ${{ steps.meta.outputs.preview_url }} |

            <sub>Commit: `${{ github.sha }}`</sub>

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: preview-cleanup-${{ github.head_ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Generate preview metadata
        id: meta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "worker_name=ria-preview-pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "preview_domain=pr-${PR_NUMBER}.re-in-act.org" >> "$GITHUB_OUTPUT"

      - name: Remove custom domain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_DOMAIN: ${{ steps.meta.outputs.preview_domain }}
        run: |
          DOMAIN_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r ".result[] | select(.hostname == \"${PREVIEW_DOMAIN}\") | .id // empty")

          if [ -n "$DOMAIN_ID" ]; then
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/domains/${DOMAIN_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}"
            echo "Removed domain ${PREVIEW_DOMAIN}"
          else
            echo "Domain ${PREVIEW_DOMAIN} not found, skipping."
          fi

      - name: Delete preview worker
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name ${{ steps.meta.outputs.worker_name }} --force
